<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LampFinance - Dashboard Executivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' } } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .dark ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; border: 1px solid #334155; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 min-h-screen flex transition-colors duration-300 antialiased overflow-x-hidden select-none">

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-3 pointer-events-none"></div>

    <div id="support-banner" class="hidden fixed top-0 left-0 right-0 bg-amber-500 text-slate-950 font-semibold px-4 py-2.5 text-center text-sm shadow-md z-50 flex items-center justify-center gap-3 transition-all duration-300">
        <span><i class="fa-solid fa-triangle-exclamation animate-pulse"></i> <strong>MODO SUPORTE ATIVO:</strong> Editando conta de <span id="support-user-email" class="underline font-bold"></span>.</span>
        <button onclick="exitImpersonation()" class="bg-slate-950 text-white px-3 py-1 rounded-md text-xs font-bold hover:bg-slate-800 transition">Sair</button>
    </div>

    <aside id="sidebar" class="sticky top-0 flex w-64 bg-white dark:bg-slate-950 border-r border-slate-200 dark:border-slate-800/80 flex flex-col justify-between h-screen z-40">
        <div class="p-5 space-y-6 overflow-y-auto flex-1 overflow-x-hidden">
            <div class="flex items-center gap-2.5 text-xl font-bold px-1 pt-2">
                <i class="fa-solid fa-lightbulb text-amber-500"></i>
                <span>Lamp<span class="text-emerald-500">Finance</span></span>
            </div>
            <nav class="space-y-1">
                <a href="dashboard.html" class="w-full flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-sm font-bold text-emerald-600 bg-emerald-500/10 dark:bg-emerald-500/5 transition-all"><i class="fa-solid fa-chart-pie w-5"></i> Dashboard</a>
                <a href="lancamentos.html" class="w-full flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-sm font-medium text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-900 transition-all"><i class="fa-solid fa-receipt w-5"></i> Lançamentos</a>
                <a href="resumo.html" class="w-full flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-sm font-medium text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-900 transition-all"><i class="fa-solid fa-table-cells w-5"></i> Resumo por Mês</a>
            </nav>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
        <header class="h-16 bg-white dark:bg-slate-950 border-b border-slate-200 dark:border-slate-800 px-8 flex justify-between items-center">
            <h2 class="text-base font-bold text-slate-800 dark:text-slate-200">Dashboard Geral</h2>
            <button onclick="toggleTheme()" class="w-9 h-9 rounded-xl bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:text-emerald-500"><i id="theme-icon" class="fa-solid fa-moon"></i></button>
        </header>

        <main class="p-8 space-y-6 flex-1 overflow-y-auto">
            <div class="grid grid-cols-1 sm:grid-cols-4 gap-5">
                <div class="bg-white dark:bg-slate-950 p-5 rounded-2xl border border-slate-800/60 shadow-sm"><div class="text-[10px] font-bold uppercase text-slate-500">Receitas</div><div id="kpi-receitas" class="text-2xl font-black text-emerald-500">R$ 0,00</div></div>
                <div class="bg-white dark:bg-slate-950 p-5 rounded-2xl border border-slate-800/60 shadow-sm"><div class="text-[10px] font-bold uppercase text-slate-500">Despesas</div><div id="kpi-despesas" class="text-2xl font-black text-rose-500">R$ 0,00</div></div>
                <div class="bg-white dark:bg-slate-950 p-5 rounded-2xl border border-slate-800/60 shadow-sm"><div class="text-[10px] font-bold uppercase text-slate-500">Saldo</div><div id="kpi-resultado" class="text-2xl font-black">R$ 0,00</div></div>
                <div class="bg-white dark:bg-slate-950 p-5 rounded-2xl border border-slate-800/60 shadow-sm"><div class="text-[10px] font-bold uppercase text-slate-500">Margem</div><div id="kpi-margem" class="text-2xl font-black text-indigo-500">0%</div></div>
            </div>

            <div class="grid grid-cols-1 gap-6">
                <div class="bg-white dark:bg-slate-950 p-6 rounded-2xl border border-slate-800/60 shadow-sm h-80">
                    <h4 class="text-[10px] font-bold uppercase text-slate-500 mb-4">Distribuição de Despesas</h4>
                    <div class="h-64 flex justify-center"><canvas id="canvas-chart-categorias"></canvas></div>
                </div>

                <div class="bg-white dark:bg-slate-950 p-6 rounded-2xl border border-slate-800/60 shadow-sm h-[480px]">
                    <h4 class="text-[10px] font-bold uppercase text-slate-500 mb-4">Fluxo Mensal de Caixa (Histórico Completo)</h4>
                    <div class="h-[400px]"><canvas id="canvas-chart-global"></canvas></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { auth, db, ADMIN_EMAIL, initTheme } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        initTheme();
        let state = { transacoes: [], categorias: [] };
        let charts = { global: null, categorias: null };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "index.html"; return; }
            const workspace = localStorage.getItem("workspace") || "empresa";
            await loadData(user.uid, workspace);
        });

        async function loadData(uid, workspace) {
            const docSnap = await getDoc(doc(db, "users", uid, "workspaces", workspace));
            if (docSnap.exists()) state.categorias = docSnap.data().categorias || [];
            const txSnapshot = await getDocs(collection(db, "users", uid, "workspaces", workspace, "transacoes"));
            state.transacoes = [];
            txSnapshot.forEach(doc => state.transacoes.push(doc.data()));
            calculateKPIs(); renderCharts();
        }

        function calculateKPIs() {
            const rec = state.transacoes.filter(t => t.tipo === "receita").reduce((acc, c) => acc + c.valor, 0);
            const desp = state.transacoes.filter(t => t.tipo === "despesa").reduce((acc, c) => acc + c.valor, 0);
            const saldo = rec - desp;
            document.getElementById("kpi-receitas").innerText = `R$ ${rec.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
            document.getElementById("kpi-despesas").innerText = `R$ ${desp.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
            document.getElementById("kpi-resultado").innerText = `R$ ${saldo.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
            document.getElementById("kpi-resultado").className = `text-2xl font-black mt-1 ${saldo >= 0 ? 'text-emerald-500':'text-rose-500'}`;
            document.getElementById("kpi-margem").innerText = rec > 0 ? ((saldo / rec) * 100).toFixed(1) + "%" : "0%";
        }

        window.renderCharts = function() {
            if (charts.global) charts.global.destroy();
            if (charts.categorias) charts.categorias.destroy();

            // Chart Linhas
            const meses = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
            let recMes = Array(12).fill(0), despMes = Array(12).fill(0);
            state.transacoes.forEach(t => {
                if(t.data) { const m = new Date(t.data + 'T00:00:00').getMonth(); if(t.tipo === "receita") recMes[m] += t.valor; else despMes[m] += t.valor; }
            });

            charts.global = new Chart(document.getElementById("canvas-chart-global"), {
                type: 'line',
                data: { labels: meses, datasets: [
                    { label: "Receitas", data: recMes, borderColor: "#22c55e", tension: 0.3 },
                    { label: "Despesas", data: despMes, borderColor: "#ef4444", tension: 0.3 }
                ]},
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Chart Pizza
            const cDesp = state.categorias.filter(c => c.tipo === "despesa");
            charts.categorias = new Chart(document.getElementById("canvas-chart-categorias"), {
                type: 'pie',
                data: { labels: cDesp.map(c => c.nome), datasets: [{ data: cDesp.map(c => state.transacoes.filter(t => String(t.categoria).trim() === String(c.codigo).trim()).reduce((a,b)=>a+b.valor,0)), backgroundColor: ["#a855f7","#ec4899","#ef4444","#eab308","#3b82f6"] }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        };

        window.toggleTheme = () => document.documentElement.classList.toggle("dark");
    </script>
</body>
</html>
