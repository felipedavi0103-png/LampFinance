<script type="module">
import { auth, db, ADMIN_EMAIL, initTheme } from "./firebase-config.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

initTheme();

/* ================================
   🔥 FORCE UPDATE (NUBANK STYLE)
================================ */
const APP_VERSION = "1.0.0"; // 👈 MUDE ISSO A CADA UPDATE

// cria banner automaticamente
const updateBanner = document.createElement("div");
updateBanner.id = "update-banner";
updateBanner.className =
  "hidden fixed top-4 left-4 right-4 z-[9999] bg-emerald-500 text-black px-4 py-3 rounded-xl shadow-xl flex items-center justify-between font-bold";
updateBanner.innerHTML = `
    <span>Nova atualização disponível 🚀</span>
    <button id="update-btn" class="underline font-extrabold">
        Atualizar agora
    </button>
`;
document.body.appendChild(updateBanner);

// função de update
function applyUpdate() {
    navigator.serviceWorker.getRegistrations().then(regs => {
        for (let reg of regs) {
            reg.update();
        }
    });

    // força limpeza leve de cache local
    localStorage.setItem("app_version", APP_VERSION);

    window.location.reload();
}

// registra service worker com controle de update
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {

            reg.onupdatefound = () => {
                const newWorker = reg.installing;

                newWorker.onstatechange = () => {
                    if (
                        newWorker.state === 'installed' &&
                        navigator.serviceWorker.controller
                    ) {
                        updateBanner.classList.remove("hidden");
                    }
                };
            };
        });
    });
}

// botão update
document.addEventListener("click", (e) => {
    if (e.target && e.target.id === "update-btn") {
        applyUpdate();
    }
});

/* ================================
   AUTH + APP LOGIC
================================ */

let state = { transacoes: [], bancos: [], categorias: [] };
let charts = { global: null, bancos: null, categorias: null };
let chartTypes = { global: 'line', bancos: 'bar', categorias: 'pie' };

onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "index.html"; return; }

    const impUid = sessionStorage.getItem("impersonatedUid");

    if (impUid && user.email === ADMIN_EMAIL) {
        document.getElementById("support-banner").classList.remove("hidden");
        document.getElementById("support-user-email").innerText =
            sessionStorage.getItem("impersonatedEmail");
    }

    if (user.email === ADMIN_EMAIL)
        document.getElementById("admin-panel-btn").classList.remove("hidden");

    const workspace = localStorage.getItem("workspace") || "empresa";
    document.getElementById("workspace-select").value = workspace;

    if (workspace === "pessoal")
        document.getElementById("menu-dre-btn").classList.add("hidden");

    document.getElementById("user-display-email").innerText = user.email;

    await loadData(impUid || user.uid, workspace);
});

async function loadData(uid, workspace) {
    try {
        const docSnap = await getDoc(doc(db, "users", uid, "workspaces", workspace));
        if (docSnap.exists()) {
            state = docSnap.data();
            calculateKPIs();
            renderCharts();
        }
    } catch (e) {
        console.error(e);
    }
}

function calculateKPIs() {
    const rec = state.transacoes.filter(t => t.tipo === "receita")
        .reduce((a, c) => a + c.valor, 0);

    const desp = state.transacoes.filter(t => t.tipo === "despesa")
        .reduce((a, c) => a + c.valor, 0);

    const saldo = rec - desp;

    document.getElementById("kpi-receitas").innerText =
        `R$ ${rec.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;

    document.getElementById("kpi-despesas").innerText =
        `R$ ${desp.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;

    document.getElementById("kpi-resultado").innerText =
        `R$ ${saldo.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;

    document.getElementById("kpi-resultado").className =
        `text-lg sm:text-xl font-extrabold ${saldo >= 0 ? 'text-emerald-500' : 'text-rose-500'}`;

    document.getElementById("kpi-margem").innerText =
        rec > 0 ? ((saldo / rec) * 100).toFixed(1) + "%" : "0.0%";
}

window.renderCharts = function () {
    const isDark = document.documentElement.classList.contains("dark");
    const textColor = isDark ? "#94a3b8" : "#475569";
    const gridColor = isDark ? "#334155" : "#e2e8f0";

    if (charts.global) charts.global.destroy();

    const meses = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

    let recMes = Array(12).fill(0);
    let despMes = Array(12).fill(0);

    state.transacoes.forEach(t => {
        const m = new Date(t.data + 'T00:00:00').getMonth();
        if (t.tipo === "receita") recMes[m] += t.valor;
        else despMes[m] += t.valor;
    });

    charts.global = new Chart(
        document.getElementById("canvas-chart-global"),
        {
            type: chartTypes.global,
            data: {
                labels: meses,
                datasets: [
                    { label: "Receitas", data: recMes, borderColor: "#22c55e" },
                    { label: "Despesas", data: despMes, borderColor: "#ef4444" }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: textColor } } }
            }
        }
    );
};

window.changeChartType = function (key, type) {
    chartTypes[key] = type;
    renderCharts();
};

window.toggleWorkspace = function () {
    localStorage.setItem("workspace",
        document.getElementById("workspace-select").value
    );
    location.reload();
};

window.toggleTheme = function () {
    document.documentElement.classList.toggle("dark");
};

window.handleLogout = async function () {
    await signOut(auth);
};
</script>
