<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LampFinance - Dashboard Executivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; }
        .tab-active { border-bottom: 3px solid #10b981; font-weight: 800; color: #10b981; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white dark:bg-slate-950 border-r border-slate-200 dark:border-slate-800 p-5 space-y-6">
        <div class="text-2xl font-black px-1 pt-2">Lamp<span class="text-emerald-500">Finance</span></div>
        <nav class="space-y-1">
            <a href="dashboard.html" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-base font-bold text-emerald-600 bg-emerald-500/10"><i class="fa-solid fa-chart-pie w-5"></i> Dashboard</a>
            <a href="lancamentos.html" class="w-full flex items-center gap-3 px-3.5 py-3 rounded-xl text-base font-semibold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-900"><i class="fa-solid fa-receipt w-5"></i> Lançamentos</a>
            <a href="configuracoes.html" class="w-full flex items-center gap-3 px-3.5 py-3 rounded-xl text-base font-semibold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-900"><i class="fa-solid fa-sliders w-5"></i> Configurações</a>
        </nav>
    </aside>

    <!-- PAINEL CENTRAL -->
    <div class="flex-1 flex flex-col min-w-0 overflow-y-auto">
        <header class="h-20 bg-white dark:bg-slate-950 border-b dark:border-slate-800 px-8 flex justify-between items-center">
            <h2 class="text-xl font-black">Dashboard & Resumo Executivo</h2>
            <!-- TAB TOGGLE -->
            <div class="flex gap-4 p-1 bg-slate-100 dark:bg-slate-900 rounded-xl">
                <button onclick="showTab('graficos')" id="btn-graficos" class="px-6 py-2.5 rounded-lg text-sm font-bold tab-active">Visual Gráfico</button>
                <button onclick="showTab('resumo')" id="btn-resumo" class="px-6 py-2.5 rounded-lg text-sm font-bold text-slate-500 hover:text-emerald-500">Matriz Mensal</button>
            </div>
        </header>

        <main class="p-8 space-y-8">
            <!-- KPIS (Fixos) -->
            <div class="grid grid-cols-1 sm:grid-cols-4 gap-5">
                <div class="bg-white dark:bg-slate-950 p-6 rounded-2xl border dark:border-slate-800 shadow-sm"><div class="text-[12px] uppercase font-bold text-slate-400">Receitas</div><div id="kpi-receitas" class="text-3xl font-black text-emerald-500">R$ 0,00</div></div>
                <div class="bg-white dark:bg-slate-950 p-6 rounded-2xl border dark:border-slate-800 shadow-sm"><div class="text-[12px] uppercase font-bold text-slate-400">Despesas</div><div id="kpi-despesas" class="text-3xl font-black text-rose-500">R$ 0,00</div></div>
                <div class="bg-white dark:bg-slate-950 p-6 rounded-2xl border dark:border-slate-800 shadow-sm"><div class="text-[12px] uppercase font-bold text-slate-400">Saldo</div><div id="kpi-resultado" class="text-3xl font-black">R$ 0,00</div></div>
                <div class="bg-white dark:bg-slate-950 p-6 rounded-2xl border dark:border-slate-800 shadow-sm"><div class="text-[12px] uppercase font-bold text-slate-400">Margem</div><div id="kpi-margem" class="text-3xl font-black text-indigo-500">0%</div></div>
            </div>

            <!-- CONTAINER GRÁFICOS -->
            <div id="view-graficos" class="space-y-6">
                <div class="bg-white dark:bg-slate-950 p-6 rounded-2xl border dark:border-slate-800 h-80"><canvas id="canvas-chart-categorias"></canvas></div>
                <div class="bg-white dark:bg-slate-950 p-6 rounded-2xl border dark:border-slate-800 h-[480px]"><canvas id="canvas-chart-global"></canvas></div>
            </div>

            <!-- CONTAINER RESUMO (MATRIZ) -->
            <div id="view-resumo" class="hidden space-y-6">
                <div class="bg-white dark:bg-slate-950 p-6 rounded-2xl border dark:border-slate-800 shadow-lg overflow-x-auto">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-black">Detalhamento Anual por Categoria</h3>
                        <select id="matrix-select-ano" onchange="renderMonthlyMatrix()" class="bg-slate-100 dark:bg-slate-900 p-3 rounded-lg font-bold text-lg"></select>
                    </div>
                    <table class="w-full text-sm border-collapse font-mono">
                        <thead class="bg-slate-100 dark:bg-slate-900 text-slate-500 uppercase text-[11px]">
                            <tr><th class="p-4 text-left">Código / Categoria</th><th class="p-4 text-right">Jan</th>...<th class="p-4 text-right font-black text-slate-900 dark:text-slate-100">Total</th></tr>
                        </thead>
                        <tbody id="tbody-matrix-mensal"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        let state = { transacoes: [], categorias: [] };
        
        window.showTab = (tab) => {
            document.getElementById('view-graficos').classList.toggle('hidden', tab !== 'graficos');
            document.getElementById('view-resumo').classList.toggle('hidden', tab !== 'resumo');
            document.getElementById('btn-graficos').className = tab === 'graficos' ? 'px-6 py-2.5 rounded-lg text-sm font-bold tab-active' : 'px-6 py-2.5 rounded-lg text-sm font-bold text-slate-500';
            document.getElementById('btn-resumo').className = tab === 'resumo' ? 'px-6 py-2.5 rounded-lg text-sm font-bold tab-active' : 'px-6 py-2.5 rounded-lg text-sm font-bold text-slate-500';
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "index.html"; return; }
            const workspace = localStorage.getItem("workspace") || "empresa";
            const docSnap = await getDoc(doc(db, "users", user.uid, "workspaces", workspace));
            if (docSnap.exists()) state.categorias = docSnap.data().categorias || [];
            const txSnapshot = await getDocs(collection(db, "users", user.uid, "workspaces", workspace, "transacoes"));
            txSnapshot.forEach(doc => state.transacoes.push(doc.data()));
            
            // Inicialização
            const years = [...new Set(state.transacoes.map(t => t.data ? new Date(t.data + 'T00:00:00').getFullYear() : new Date().getFullYear()))].sort((a,b)=>b-a);
            document.getElementById("matrix-select-ano").innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
            
            // Funções de renderização de KPIs e Gráficos que você já possui...
            // (Reutilizar a lógica de renderCharts e renderMonthlyMatrix conforme código anterior)
        });
    </script>
</body>
</html>
