<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LampFinance - Login</title>

    <link rel="icon" type="image/png" sizes="32x32" href="financial_lamp_logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="financial_lamp_logo.png">
    <link rel="apple-touch-icon" href="financial_lamp_logo.png">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                        }
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0px 1000px #0f172a inset !important;
            -webkit-text-fill-color: #f8fafc !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100
             min-h-screen flex flex-col items-center justify-center
             p-6 antialiased text-base transition-colors duration-500 ease-out select-none">

    <!-- Mensagem Padrão de Sistema (Sem Clique) -->
    <div class="fixed top-6 right-6 z-40 flex items-center gap-2 px-3 py-1.5 rounded-xl text-xs font-semibold tracking-wide
                bg-slate-100 text-slate-500 border border-slate-200
                dark:bg-slate-950 dark:text-emerald-500/90 dark:border-emerald-500/30 pointer-events-none">
        <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
        </span>
        <span>Servidor Conectado</span>
    </div>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-3 pointer-events-none"></div>

    <div id="loading-screen" class="fixed inset-0 bg-slate-900/98 backdrop-blur-lg z-50 hidden flex flex-col items-center justify-center space-y-6">
        <div class="flex items-center gap-3 text-4xl font-extrabold text-white tracking-tight">
            <img src="financial_lamp_logo.png" class="w-16 h-16 drop-shadow-[0_0_15px_rgba(34,197,94,0.2)]">
            <span>Lamp<span class="text-emerald-500">Finance</span></span>
        </div>

        <div class="flex flex-col items-center space-y-4">
            <div class="w-48 h-1 bg-slate-800 rounded-full overflow-hidden relative">
                <div class="absolute inset-y-0 bg-emerald-500 w-1/2 rounded-full" style="animation: dash 1.5s infinite ease-in-out;"></div>
            </div>
            <p class="text-xs font-medium tracking-wider text-slate-400 uppercase">Acessando Diretrizes...</p>
        </div>
    </div>

    <div id="auth-container"
         class="w-full max-w-[420px] mx-auto bg-white dark:bg-slate-950
                p-8 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800/80
                space-y-6 transition-all duration-300">

        <div class="text-center space-y-1.5">
            <div id="auth-logo-wrapper" class="flex flex-col items-center gap-3 text-3xl font-extrabold tracking-tight">
                <img id="auth-logo-img" src="financial_lamp_logo.png" class="w-16 h-16 drop-shadow-[0_4px_10px_rgba(34,197,94,0.15)]">
                <span>Lamp<span class="text-emerald-500">Finance</span></span>
            </div>

            <p class="text-sm text-slate-400 dark:text-slate-500 font-medium">
                Gerenciador Financeiro Corporativo
            </p>
        </div>

        <form id="auth-form" onsubmit="handleAuth(event)" class="space-y-4">
            <div>
                <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-1.5 px-0.5">E-mail corporativo</label>
                <input type="email" id="auth-email" required placeholder="nome@empresa.com" autocomplete="username"
                       class="w-full px-4 py-3 text-sm rounded-xl bg-slate-50 dark:bg-slate-900/50
                              border border-slate-200 dark:border-slate-800/80 text-slate-800 dark:text-slate-100
                              placeholder-slate-400 dark:placeholder-slate-600
                              focus:border-emerald-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-emerald-500/10 outline-none transition-all duration-200">
            </div>

            <div>
                <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-1.5 px-0.5">Senha de acesso</label>
                <input type="password" id="auth-password" required placeholder="••••••••" autocomplete="current-password"
                       class="w-full px-4 py-3 text-sm rounded-xl bg-slate-50 dark:bg-slate-900/50
                              border border-slate-200 dark:border-slate-800/80 text-slate-800 dark:text-slate-100
                              placeholder-slate-400 dark:placeholder-slate-600
                              focus:border-emerald-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-emerald-500/10 outline-none transition-all duration-200">
            </div>

            <div id="register-only-fields" class="hidden opacity-0 transform translate-y-[-10px] transition-all duration-300 ease-out space-y-4">
                <div>
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-1.5 px-0.5">Confirmação de Senha</label>
                    <input type="password" id="auth-confirm-password" placeholder="••••••••" autocomplete="new-password"
                           class="w-full px-4 py-3 text-sm rounded-xl bg-slate-50 dark:bg-slate-900/50
                                  border border-slate-200 dark:border-slate-800/80 text-slate-800 dark:text-slate-100
                                  placeholder-slate-400 dark:placeholder-slate-600
                                  focus:border-emerald-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-emerald-500/10 outline-none transition-all duration-200">
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" id="auth-submit-btn"
                        class="w-full py-3.5 text-sm rounded-xl bg-emerald-500 hover:bg-emerald-600 active:bg-emerald-700
                               text-slate-950 font-bold tracking-wide transition-all duration-150 shadow-md shadow-emerald-500/10 
                               active:scale-[0.99] cursor-default flex items-center justify-center gap-2">
                    <span>Entrar no Sistema</span>
                    <i class="fa-solid fa-arrow-right text-xs"></i>
                </button>
            </div>
        </form>

        <div class="text-center pt-2 border-t border-slate-100 dark:border-slate-900">
            <button onclick="toggleAuthMode()" id="auth-toggle-btn"
                    class="text-xs text-emerald-500 hover:text-emerald-400 font-semibold transition-colors duration-150 cursor-default">
                Não possui credenciais? Cadastre sua conta
            </button>
        </div>
    </div>

<style>
    @keyframes dash {
        0% { left: -50%; width: 50%; }
        50% { left: 25%; width: 40%; }
        100% { left: 100%; width: 50%; }
    }
</style>

<script type="module">
import { auth, db, initTheme } from "./firebase-config.js";
import { signInWithEmailAndPassword, createUserWithEmailAndPassword, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { doc, setDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

try {
    initTheme();
} catch(e) {
    console.log("Tema padrão ativado.");
}

try {
    await setPersistence(auth, browserSessionPersistence);
} catch (error) {
    console.error("Erro ao aplicar persistência de sessão:", error);
}

window.handleAuth = async function(e) {
    e.preventDefault();
    const email = document.getElementById("auth-email").value.trim();
    const password = document.getElementById("auth-password").value;
    const isRegister = !document.getElementById("register-only-fields").classList.contains("hidden");

    try {
        if (isRegister) {
            const confirm = document.getElementById("auth-confirm-password").value;
            if (password !== confirm) return;

            const credential = await createUserWithEmailAndPassword(auth, email, password);
            await setDoc(doc(db, "users_profiles", credential.user.uid), {
                uid: credential.user.uid,
                email: email
            });
        } else {
            await signInWithEmailAndPassword(auth, email, password);
        }

        document.getElementById("auth-container").classList.add("opacity-0", "scale-95");
        document.getElementById("loading-screen").classList.remove("hidden");
        
        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1500);

    } catch (err) {
        console.error(err);
    }
};

window.toggleAuthMode = function() {
    const regFields = document.getElementById("register-only-fields");
    const submitBtn = document.getElementById("auth-submit-btn");
    const toggleBtn = document.getElementById("auth-toggle-btn");
    
    if (regFields.classList.contains("hidden")) {
        regFields.classList.remove("hidden");
        setTimeout(() => {
            regFields.classList.remove("opacity-0", "translate-y-[-10px]");
        }, 10);
        submitBtn.innerHTML = `<span>Criar Nova Conta</span> <i class="fa-solid fa-user-plus text-xs"></i>`;
        toggleBtn.innerText = "Já possui uma conta? Realizar Login";
    } else {
        regFields.classList.add("opacity-0", "translate-y-[-10px]");
        setTimeout(() => {
            regFields.classList.add("hidden");
        }, 300);
        submitBtn.innerHTML = `<span>Entrar no Sistema</span> <i class="fa-solid fa-arrow-right text-xs"></i>`;
        toggleBtn.innerText = "Não possui credenciais? Cadastre sua conta";
    }
};
</script>
</body>
</html>
